<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Embedded Sprite Animation Viewer</title>
<style>
:root{--scale:3.3;--bg:#080811;--card:#171724;--line:#303048;--text:#f5f3ff;--muted:#aaa7c4;--orange:#ff9b32;--violet:#9b63ff}
*{box-sizing:border-box}body{margin:0;min-height:100vh;color:var(--text);font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Arial,sans-serif;background:radial-gradient(circle at 10% 0%,rgba(155,99,255,.28),transparent 25rem),radial-gradient(circle at 90% 15%,rgba(255,155,50,.18),transparent 25rem),linear-gradient(#080811,#10101a 55%,#07070d)}
.app{max-width:1100px;margin:auto;padding:26px 16px 40px}header{display:flex;justify-content:space-between;gap:16px;align-items:end;margin-bottom:16px}h1{margin:0;font-size:clamp(1.7rem,4vw,3rem);letter-spacing:-.06em;line-height:.98}.sub{color:var(--muted);margin:8px 0 0}.chip{border:1px solid var(--line);background:rgba(255,255,255,.05);border-radius:999px;padding:9px 13px;color:#e8e5ff;white-space:nowrap}
.layout{display:grid;grid-template-columns:1fr 330px;gap:16px}@media(max-width:850px){.layout{grid-template-columns:1fr}header{display:block}.chip{display:inline-block;margin-top:12px}}
.card{border:1px solid var(--line);border-radius:24px;background:rgba(23,23,36,.9);box-shadow:0 24px 80px rgba(0,0,0,.34);overflow:hidden}.top{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid var(--line);background:rgba(255,255,255,.025)}.top b{font-size:.95rem}.status{font-weight:900;font-size:.78rem;border-radius:999px;padding:6px 10px;background:linear-gradient(135deg,var(--orange),#ffd38a);color:#17110b}
.stage{height:480px;margin:16px;border:1px solid #292942;border-radius:20px;position:relative;overflow:hidden;background:linear-gradient(rgba(255,255,255,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.035) 1px,transparent 1px),radial-gradient(circle at 50% 72%,rgba(255,155,50,.17),transparent 17rem),#0b0b13;background-size:24px 24px,24px 24px,auto,auto}.floor{position:absolute;left:0;right:0;bottom:92px;height:2px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.24),transparent)}.shadow{position:absolute;left:50%;bottom:75px;transform:translateX(-50%);width:155px;height:28px;border-radius:50%;background:radial-gradient(ellipse,rgba(0,0,0,.55),transparent 70%);filter:blur(1px)}#sprite{position:absolute;left:50%;bottom:92px;transform:translateX(-50%) scale(var(--scale));transform-origin:50% 100%;image-rendering:pixelated;image-rendering:crisp-edges}
.info{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:0 16px 16px}.stat{border:1px solid var(--line);border-radius:15px;background:rgba(255,255,255,.045);padding:11px;min-width:0}.stat small{display:block;color:var(--muted);font-size:.76rem;margin-bottom:3px}.stat strong{display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:.92rem}
.controls{padding:16px;display:grid;gap:13px}label{font-size:.86rem;font-weight:800;color:#dedbf5;margin-bottom:7px;display:block}select{width:100%;padding:12px;border-radius:13px;border:1px solid var(--line);background:#10101a;color:var(--text);font-size:1rem;outline:none}input[type=range]{width:100%;accent-color:var(--orange)}.buttons{display:grid;grid-template-columns:1fr 1fr;gap:9px}button{cursor:pointer;border:1px solid var(--line);border-radius:13px;background:linear-gradient(#28283b,#1a1a29);color:var(--text);padding:11px;font-weight:900}button:hover{filter:brightness(1.1);border-color:#555579}.primary{background:linear-gradient(135deg,var(--orange),#f06033);color:#160f09}.checks{display:grid;gap:8px;color:var(--muted);font-size:.92rem}.checks label{font-weight:600;color:var(--muted);margin:0;display:flex;align-items:center;gap:8px}
.thumbs{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;max-height:330px;overflow:auto;padding:0 16px 16px}.thumb{height:76px;border:1px solid var(--line);border-radius:12px;background:#0d0d15;position:relative;display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden}.thumb.active{border-color:var(--orange);box-shadow:0 0 0 2px rgba(255,155,50,.16) inset}.thumb img{max-width:88%;max-height:64px;image-rendering:pixelated}.thumb span{position:absolute;left:5px;bottom:4px;background:rgba(0,0,0,.5);border-radius:999px;padding:1px 5px;color:#ddd9ff;font-size:10px}
.help{margin-top:14px;color:var(--muted);font-size:.92rem;text-align:center}kbd{background:#1d1d2d;border:1px solid var(--line);border-bottom-color:#555570;padding:2px 6px;border-radius:6px;color:#fff}
</style>
</head>

for(const a of DATA.animations){const o=document.createElement('option');o.value=a.id;o.textContent=`${names[a.id]||a.label} (${a.frameIds.length})`;$('anim').appendChild(o)}
function setAnim(id){current=DATA.animations.find(a=>a.id===id)||DATA.animations[0];index=0;dir=1;$('fps').value=current.fps||8;updateLabels();drawThumbs();render()}
function updateLabels(){$('fpsLabel').textContent=$('fps').value;$('fpsRead').textContent=$('fps').value+' FPS';$('scaleLabel').textContent=$('scale').value;document.documentElement.style.setProperty('--scale',$('scale').value)}
function drawThumbs(){$('thumbs').innerHTML='';current.frameIds.forEach((id,i)=>{const f=byId.get(id);const d=document.createElement('div');d.className='thumb';d.innerHTML=`<img src="${f.src}" alt=""><span>${i+1}</span>`;d.onclick=()=>{index=i;render()};$('thumbs').appendChild(d)})}
function render(){const f=byId.get(current.frameIds[index]);$('sprite').src=f.src;const flip=$('flip').checked?-1:1;$('sprite').style.transform=`translateX(-50%) scale(${flip*Number($('scale').value)}, ${Number($('scale').value)})`;$('title').textContent=names[current.id]||current.label;$('frame').textContent=`${index+1} / ${current.frameIds.length}`;$('file').textContent=f.file.split('/').pop();$('status').textContent=playing?'Playing':'Paused';$('play').textContent=playing?'Pause':'Play';[...$('thumbs').children].forEach((e,i)=>e.classList.toggle('active',i===index))}
function step(n=1){if($('pingpong').checked){index+=dir*n;if(index>=current.frameIds.length){dir=-1;index=Math.max(0,current.frameIds.length-2)}if(index<0){dir=1;index=Math.min(1,current.frameIds.length-1)}}else{index=(index+n+current.frameIds.length)%current.frameIds.length}render()}
function loop(t){const interval=1000/Number($('fps').value);if(playing&&t-last>=interval){last=t;step(1)}requestAnimationFrame(loop)}
$('anim').onchange=e=>setAnim(e.target.value);$('play').onclick=()=>{playing=!playing;render()};$('restart').onclick=()=>{index=0;dir=1;render()};$('prev').onclick=()=>step(-1);$('next').onclick=()=>step(1);$('fps').oninput=()=>{updateLabels();render()};$('scale').oninput=()=>{updateLabels();render()};$('flip').onchange=render;
document.addEventListener('keydown',e=>{if(e.code==='Space'){e.preventDefault();$('play').click()}if(e.key==='ArrowLeft')step(-1);if(e.key==='ArrowRight')step(1);if('1234'.includes(e.key)){const i=Number(e.key)-1;if(DATA.animations[i]){$('anim').value=DATA.animations[i].id;setAnim(DATA.animations[i].id)}}});
setAnim(current.id);requestAnimationFrame(loop);
</script></body></html>
